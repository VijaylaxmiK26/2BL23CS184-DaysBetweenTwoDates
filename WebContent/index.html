<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Days Between Two Dates</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

.container{
    width:450px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    text-align:center;
    color:#003366;
}

input[type=date]{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:20px;
}

input[type=submit]{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Days Between Two Dates</h2>

<form action="days" method="post">

<label>Start Date</label>
<input type="date" name="startDate" required>

<label>End Date</label>
<input type="date" name="endDate" required>

<input type="submit" value="Calculate Difference">

</form>

</div>

</body>
</html>
